<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}CropHealth{% endblock %} — CropHealth</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=Epilogue:wght@300..700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/base.css">
  <link rel="stylesheet" href="/static/css/app.css">
  {% block head %}{% endblock %}
</head>
<body>
<div class="app-shell">
  <header class="topbar" role="banner">

    <nav class="stepper" aria-label="Steps">
      <a href="/upload" class="step {% if step == 1 %}active{% elif step > 1 %}done{% endif %}">
        <span class="step-num">{% if step > 1 %}✓{% else %}1{% endif %}</span>
        <span>Upload</span>
      </a>
      <a href="/analyze" class="step {% if step == 2 %}active{% elif step > 2 %}done{% endif %}">
        <span class="step-num">{% if step > 2 %}✓{% else %}2{% endif %}</span>
        <span>Analyze</span>
      </a>
      <a href="/map" class="step {% if step == 3 %}active{% endif %}">
        <span class="step-num">3</span>
        <span>Map</span>
      </a>
    </nav>

  <button class="btn btn-danger" id="btn-reset" onclick="resetSession()">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
      <polyline points="1 4 1 10 7 10"/>
      <path d="M3.51 15a9 9 0 1 0 .49-4.95"/>
    </svg>
    Reset Upload
  </button>
  </header>

  <main class="main-content" id="main-content">
    {% block content %}{% endblock %}
  </main>
</div>

<div id="toast" aria-live="polite"></div>

<script>
(function(){
  const t = document.querySelector('[data-theme-toggle]');
  const r = document.documentElement;
  let d = matchMedia('(prefers-color-scheme:dark)').matches ? 'dark' : 'light';
  r.setAttribute('data-theme', d);
  const moon = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
  const sun  = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>';
  if(t) t.addEventListener('click', () => {
    d = d === 'dark' ? 'light' : 'dark';
    r.setAttribute('data-theme', d);
    t.innerHTML = d === 'dark' ? moon : sun;
  });
})();

async function resetSession() {
  if (!confirm('This will clear all uploaded photos and results. Continue?')) return;
  await fetch('/api/clear', { method: 'POST' });
  window.location.href = '/upload';
}

function showToast(msg, type='info', duration=3500) {
  const wrap = document.getElementById('toast');
  const el = document.createElement('div');
  el.className = `toast-item toast-${type}`;
  el.textContent = msg;
  wrap.appendChild(el);
  setTimeout(() => el.remove(), duration);
}
window.showToast = showToast;
</script>
{% block scripts %}{% endblock %}
</body>
</html>
